name: Release

# Triggered when a version tag is pushed (e.g. `git tag v0.4.0 && git push origin v0.4.0`).
# Builds the plugin, packages it as a WordPress-style zip, and attaches it to a
# GitHub Release with the same name as the tag.
#
# The file list below mirrors `FILES_TO_COPY` in package-and-test.sh so the
# GitHub release zip and the wordpress.org SVN trunk stay identical.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build

      - name: Package plugin zip
        run: |
          SLUG=gt-podcast-bb
          mkdir -p staging/$SLUG
          cp gt-podcast-bb.php readme.txt staging/$SLUG/
          cp -r public resources templates staging/$SLUG/
          if [ -d languages ]; then
            cp -r languages staging/$SLUG/
          fi
          cd staging && zip -r ../$SLUG.zip $SLUG

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            gt-podcast-bb.zip \
          || gh release upload "$GITHUB_REF_NAME" gt-podcast-bb.zip --clobber
